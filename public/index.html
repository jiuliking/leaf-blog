<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>why me</title>
  <meta name="description" content="why me 的个人博客，记录有意思的事情。">
  <link rel="icon" type="image/svg+xml" href="./favicon.svg?v=2">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fragment+Mono:wght@400;500&family=Noto+Serif+SC:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body data-page="home">
  <script>(function(){var m=localStorage.getItem('xiaogai-display-mode');if(m==='day'){document.body.className='light';}else if(m==='sunny'||!m){document.body.className='light sunny';}/* night: no class needed */})();</script>
  <div class="noise"></div>
  <video id="leaves-overlay" src="./leaves.mp4" loop muted playsinline preload="none"></video>
  <audio id="forest-audio" src="./forest.mp3" loop preload="none"></audio>
  <div class="sun-glow"></div>
  <div class="light-shaft light-shaft-1"></div>
  <div class="light-shaft light-shaft-2"></div>
  <div class="light-shaft light-shaft-3"></div>

  <div class="mode-indicator">
    <a class="subtle-link mode-link" href="./admin.html">CMS</a>
    <div class="mode-dot" id="dot-night"></div>
    <div class="mode-dot" id="dot-day"></div>
    <div class="mode-dot" id="dot-sunny"></div>
  </div>

  <main class="page">
    <section class="hero home-hero">
      <div id="site-logo" class="logo">
        <button class="logo-letter" type="button" data-mode="night">
          w
          <span class="logo-hint">Something</span>
        </button>
        <button class="logo-letter" type="button" data-mode="day">
          h
          <span class="logo-hint">Interesting</span>
        </button>
        <span class="logo-gap" aria-hidden="true"></span>
        <button class="logo-letter" type="button" data-mode="sunny">
          y
          <span class="logo-hint">Thoughtful</span>
        </button>
        <button class="logo-letter" type="button" data-mode="night">
          m
          <span class="logo-hint">Writing</span>
        </button>
        <button class="logo-letter" type="button" data-mode="day">
          e
          <span class="logo-hint">Everyday</span>
        </button>
      </div>
      <p id="site-bio" class="bio">做有意思的事情。</p>
    </section>

    <div class="divider"></div>

    <section class="section home-stream-section">
      <div class="section-head">
        <div></div>
      </div>
      <div id="posts-list" class="entries"></div>
      <div id="posts-empty" class="empty-state hidden">还没有发布文章。你可以先去后台写第一篇。</div>
      <div id="home-posts-pagination" class="home-pagination"></div>
    </section>

    <div class="divider"></div>

    <section class="section connect-section">
      <div class="section-title">Connect</div>
      <div class="links links-connect">
        <a id="connect-rss-link" href="/blogApi?action=getRss" target="_blank" rel="noreferrer">RSS</a>
        <a id="connect-rednote-link" href="https://www.xiaohongshu.com/user/profile/6720c690000000001c01b883?xsec_token=ABRs9q5J79rkqZIGS1vjAYLPMItpArQTzpcWQTTo1KZvU=&xsec_source=pc_feed" target="_blank" rel="noreferrer">小红书</a>
        <a id="connect-email-link" href="mailto:gainubi@gmail.com">邮箱</a>
      </div>
    </section>
  </main>

  <div class="shortcuts-hint">
    <kbd>D</kbd> day &nbsp; <kbd>N</kbd> night &nbsp; <kbd>S</kbd> sunny
  </div>

  <script src="./cloudbase-config.js"></script>
  <script src="./app.js?v=202604022030"></script>
</body>
</html>
